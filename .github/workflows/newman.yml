name: Run Newman tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    newman:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run newman collection tests
              env:
                  BASE_URL: "${{ secrets.BASE_URL }}"
                  ADMIN_PASSWORD: "${{ secrets.ADMIN_PASSWORD }}"
              run: |
                  if [ -z "$BASE_URL" ]; then
                    BASE_URL="https://cflaircounter.pages.dev"
                  fi
                  npm run test:newman:ci -- --env-var "base_url=$BASE_URL" --env-var "admin_password=$ADMIN_PASSWORD"
